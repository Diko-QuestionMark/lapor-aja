[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/reports"
  to = "/.netlify/functions/reports"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/admin/reports"
  to = "/.netlify/functions/admin-reports"
  status = 200
