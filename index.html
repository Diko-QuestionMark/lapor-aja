<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaporAja Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <div>
          <h1 class="h4 mb-0 text-white">LaporAja</h1>
          <small class="text-white-50">Laporkan masalah kota dengan cepat</small>
        </div>
      </div>
    </nav>

    <main class="container py-4 pengecilan">
      <section class="card shadow-sm mb-3">
        <div class="card-body">
          <h2 class="h5 card-title">Kirim Laporan</h2>

          <div class="mb-3">
            <label for="photo" class="form-label">Foto Masalah</label>
            <input class="form-control" type="file" id="photo" accept="image/*" />
          </div>

          <div class="mb-3">
            <label for="desc" class="form-label">Deskripsi (opsional)</label>
            <textarea
              id="desc"
              class="form-control"
              rows="3"
              placeholder="contoh: lampu jalan mati"
            ></textarea>
          </div>

          <div class="form-check mb-2">
            <input
              class="form-check-input"
              type="checkbox"
              id="useLocation"
              onchange="toggleLocation(this)"
            />
            <label class="form-check-label" for="useLocation">
              Gunakan Lokasi Saya
            </label>
          </div>

          <p id="locText" class="small text-secondary mb-3"></p>

          <button
            id="submitBtn"
            class="btn btn-primary"
            onclick="submitReport()"
          >
            Kirim Laporan
          </button>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 card-title">Laporan Terbaru</h2>
          <div id="reportList"></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
