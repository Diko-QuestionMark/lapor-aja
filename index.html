<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaporAja Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container d-flex justify-content-between align-items-center">
        <div>
          <h1 class="h4 mb-0 text-white">LaporAja</h1>
          <small class="text-white-50">Laporkan masalah kota dengan cepat</small>
        </div>
        <a href="/admin.html" class="btn btn-outline-light btn-sm">Admin</a>
      </div>
    </nav>

    <main class="container py-4 pengecilan">
      <section class="mb-3">
        <p class="text-secondary mb-2">
          Pantau laporan warga terbaru, klik foto untuk melihat detail.
        </p>
      </section>
      <section class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2">
              <h2 class="h5 card-title mb-0">Laporan Terbaru</h2>
              <span id="reportCount" class="badge text-bg-light border">0</span>
            </div>
            <select id="sortFilter" class="form-select form-select-sm filter-select">
              <option value="newest">Terbaru</option>
              <option value="oldest">Terlama</option>
            </select>
          </div>
          <div id="reportList"></div>
        </div>
      </section>
    </main>

    <button
      class="btn btn-primary fab-add shadow"
      type="button"
      data-bs-toggle="modal"
      data-bs-target="#reportModal"
      aria-label="Buat Laporan"
    >
      +
    </button>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5">Kirim Laporan</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="photo" class="form-label">Foto Masalah</label>
              <input class="form-control" type="file" id="photo" accept="image/*" />
              <div id="photoError" class="small text-danger mt-1 d-none"></div>
            </div>

            <div id="photoPreviewWrap" class="preview-wrap d-none mb-3">
              <img id="photoPreview" alt="Preview foto" class="img-fluid rounded border" />
            </div>

            <div class="mb-3">
              <label for="desc" class="form-label">Deskripsi (opsional)</label>
              <textarea
                id="desc"
                class="form-control"
                rows="3"
                placeholder="contoh: lampu jalan mati"
              ></textarea>
            </div>

            <div class="form-check mb-2">
              <input
                class="form-check-input"
                type="checkbox"
                id="useLocation"
                onchange="toggleLocation(this)"
              />
              <label class="form-check-label" for="useLocation">
                Gunakan Lokasi Saya
              </label>
            </div>

            <p id="locText" class="small text-secondary mb-0"></p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
            <button id="submitBtn" type="button" class="btn btn-primary" onclick="submitReport()">
              Kirim Laporan
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3 toast-wrap">
      <div id="appToast" class="toast align-items-center border-0 text-bg-dark" role="status" aria-live="polite" aria-atomic="true">
        <div class="d-flex">
          <div id="appToastBody" class="toast-body">Sukses</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <div class="modal fade" id="imageInspectModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="imageInspectTitle" class="modal-title fs-6">Detail Foto Laporan</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <img id="imageInspectPreview" class="img-fluid rounded border inspect-modal-image" alt="Detail foto laporan" />
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
